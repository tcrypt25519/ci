name: Commit changes
description: Commit and push changes back to the source branch when files have been modified

inputs:
  commit-message:
    description: Commit message to use when committing changes
    required: false
    default: "chore(fmt): From CI 🤖"
  ref:
    description: Branch or ref to push changes to
    required: false
    default: ""
  user-name:
    description: Git user name for committing
    required: false
    default: "tcrypt25519"
  user-email:
    description: Git user email for committing
    required: false
    default: "mail@tcry.pt"
  add-flags:
    description: Flags passed to git add when staging changes
    required: false
    default: "-u"

runs:
  using: composite
  steps:
    - name: Get target ref
      id: get_target
      run: |
          if [ -n "${{ inputs.ref }}" ]; then
            TARGET_REF="${{ inputs.ref }}"
          else
            TARGET_REF=$(git rev-parse --abbrev-ref HEAD)
          fi

          if [ -z "$TARGET_REF" ]; then
            echo "Target ref is required; set the ref input or checkout a branch" >&2
            exit 1
          fi
          echo "Found target ref: $TARGET_REF"
          echo "ref=$TARGET_REF" >> $GITHUB_OUTPUT

    - name: Stage changes
      id: stage_changes
      shell: bash
      run: |
        git add ${{ inputs.add-flags }}

        if git diff --cached --quiet; then
          echo "No changes to commit ✅"
          echo "changes_staged=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "changes_staged=true" >> $GITHUB_OUTPUT

    - name: Commit and push changes
      if: steps.stage_changes.outputs.changes_staged == 'true'
      shell: bash
      run: |
        git config user.name "${{ inputs.user-name }}"
        git config user.email "${{ inputs.user-email }}"

        REF=${{ steps.get_target.outputs.ref }}
        git fetch origin "$REF"
        git pull --rebase origin "$REF"
        git commit -m "${{ inputs.commit-message }}"
        git push origin HEAD:"$REF"
