name: Commit changes
description: Commit and push changes back to the source branch when files have been modified

inputs:
  commit-message:
    description: Commit message to use when committing changes
    required: false
    default: "chore: CI change 🤖"
  ref:
    description: Branch or ref to push changes to (defaults to a symbol lookup on HEAD)
    required: false
    default: ""
  user-name:
    description: Git user name for committing
    required: false
    default: "tcrypt25519"
  user-email:
    description: Git user email for committing
    required: false
    default: "mail@tcry.pt"
  add-flags:
    description: Flags passed to git add when staging changes
    required: false
    default: "-u"

runs:
  using: composite
  steps:
    - name: Get target ref
      id: get_target
      shell: bash
      run: |
          if [ -n "${{ inputs.ref }}" ]; then
            TARGET="${{ inputs.ref }}"
          elif ! TARGET=$(git symbolic-ref --short -q HEAD); then
            TARGET="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          fi

          if [ -z "$TARGET" ]; then
            echo "Target ref could not be determined; ensure ref input is set, a branch is checked out, or GitHub ref environment variables are available" >&2
            exit 1
          fi

          echo "Found target ref: $TARGET"
          echo "ref=$TARGET" >> $GITHUB_OUTPUT

    - name: Stage changes
      id: stage_changes
      shell: bash
      run: |
        read -r -a ADD_ARGS <<< "${{ inputs.add-flags }}"
        git add "${ADD_ARGS[@]}"

        if git diff --cached --quiet; then
          echo "No changes to commit ✅"
          echo "changes_staged=false" >> $GITHUB_OUTPUT
        else
          echo "changes_staged=true" >> $GITHUB_OUTPUT
        fi

    - name: Commit and push changes
      if: steps.stage_changes.outputs.changes_staged == 'true'
      shell: bash
      run: |
        git config user.name "${{ inputs.user-name }}"
        git config user.email "${{ inputs.user-email }}"

        REF="${{ steps.get_target.outputs.ref }}"
        git commit --no-verify -m "${{ inputs.commit-message }}"
        git pull --rebase origin "$REF"
        git push origin HEAD:"$REF"
