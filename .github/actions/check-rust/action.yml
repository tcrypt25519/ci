name: Check Rust
description: Run Rust CI checks including formatting, linting, and tests

inputs:
  run-coverage:
    description: Run coverage with cargo-llvm-cov and upload the lcov report
    required: false
    default: "false"
  codecov-token:
    description: Codecov token used when uploading coverage (required if run-coverage is true)
    required: false
    default: ""

runs:
  using: composite
  steps:
    # Install nightly with an isolated target
    - name: Install Rust nightly (for rustfmt)
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: nightly
        components: rustfmt,llvm-tools-preview
        cache-all-crates: true
        cache-bin: false
        cache-shared-key: nightly
        cache-workspaces: . -> target-nightly

    - name: Format code
      shell: bash
      run: cargo fmt 2>&1 | tee fmt.log

    - name: Commit and push
      uses: tcrypt25519/ci/.github/actions/commit-changes@main
  
    # Install Stable and run the remaining checks
    - name: Install Rust stable
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        components: clippy,llvm-tools-preview
        cache-all-crates: true
        cache-bin: false
        cache-shared-key: stable
        cache-targets: true
        cache-workspaces: . -> target

    - name: Check clippy
      shell: bash
      run: >
        cargo clippy
        --profile ci
        --keep-going
        --workspace
        --all-targets
        -- -D warnings
        2>&1 | tee clippy.log

    - name: Install Nextest
      uses: taiki-e/install-action@nextest
    
    - name: Check tests
      shell: bash
      run: cargo nextest run --locked --cargo-profile ci 2>&1 | tee test.log

    - name: Check doc tests
      shell: bash
      run: cargo test --doc --locked --profile ci 2>&1 | tee test-docs.log

    - name: Install cargo-llvm-cov
      if: inputs.run-coverage == 'true'
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Generate coverage report
      if: inputs.run-coverage == 'true'
      shell: bash
      run: cargo llvm-cov --locked --profile ci --lcov --output-path lcov.info

    - name: Upload to Codecov
      if: inputs.run-coverage == 'true'
      uses: codecov/codecov-action@v4
      with:
        files: lcov.info
        fail_ci_if_error: true
      env:
        CODECOV_TOKEN: ${{ inputs.codecov-token }}

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ci-logs
        path: |
          fmt.log
          clippy.log
          test.log
          test-docs.log
        retention-days: 30 
